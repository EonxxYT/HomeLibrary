<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Media Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Family Media Library</div>
    <input type="text" id="search" placeholder="Search movies..." />
  </header>

  <main>
    <section id="movieGrid" class="movie-grid"></section>
  </main>

  <div id="openingOverlay" class="opening-overlay">
    <div class="opening-card">
      <div class="spinner"></div>
      <div class="opening-text">Opening movie...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
